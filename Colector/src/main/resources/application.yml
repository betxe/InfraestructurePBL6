server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: webhardmon-colector

  # ── Kafka Producer ─────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:10.10.1.52:9092}
    producer:
      # Clave: String (agent_id) | Valor: byte[] (Avro binario — pass-through)
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      # Durabilidad: líder + réplicas in-sync deben confirmar
      acks: all
      # Reintentos ante errores transitorios de red
      retries: 3
      properties:
        delivery.timeout.ms: 30000
        # Idempotencia: evita duplicados en caso de reintento
        enable.idempotence: true

# ── Actuator — health check para Cloudflare Tunnel ─────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# ── Configuración propia de WebHardMon ─────────────────────────────────
webhardmon:
  kafka:
    topic: ${KAFKA_TOPIC:raw-telemetry}

# ── Logging ────────────────────────────────────────────────────────────
logging:
  level:
    com.webhardmon: INFO
    org.springframework.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
